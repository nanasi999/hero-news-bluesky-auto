name: Post blog articles to Bluesky

on:
  schedule:
    - cron: "1,6,11,16,21,26,31,36,41,46,51,56 * * * *"
  workflow_dispatch:

concurrency:
  group: bluesky-auto-post
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install atproto feedparser

      - name: Post new articles
        run: python scripts/post_to_bluesky.py
        env:
          BLOG_RSS_URL: "https://hero-news.com/feed"
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          MAX_POSTS: "20"

      - name: Save posted state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .bluesky-posted.json
          git diff --cached --quiet && exit 0
          git commit -m "Update Bluesky auto-post state"
          git pull --rebase
          git push
