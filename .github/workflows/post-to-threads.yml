name: Post blog articles to Threads

on:
  repository_dispatch:
    types:
      - bluesky-auto-post
      - threads-auto-post
  workflow_dispatch:

concurrency:
  group: threads-auto-post
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install feedparser requests

      - name: Post new articles
        run: python scripts/post_to_threads.py
        env:
          BLOG_RSS_URL: "https://hero-news.com/feed"
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          MAX_POSTS: "20"

      - name: Save posted state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .threads-posted.json
          git diff --cached --quiet && exit 0
          git commit -m "Update Threads auto-post state"
          git pull --rebase
          git push
