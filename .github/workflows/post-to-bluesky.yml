name: Post blog articles to Bluesky

on:
  repository_dispatch:
    types:
      - bluesky-auto-post
  workflow_dispatch:

concurrency:
  group: bluesky-auto-post
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest posted state
        run: git pull --ff-only origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install atproto feedparser

      - name: Post new articles
        run: python scripts/post_to_bluesky.py
        env:
          BLOG_RSS_URL: "https://hero-news.com/feed"
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          MAX_POSTS: "20"

      - name: Save posted state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .bluesky-posted.json
          git diff --cached --quiet && exit 0
          git commit -m "Update Bluesky auto-post state"

          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              exit 0
            fi
            git rebase --abort || true
            sleep $((attempt * 5))
          done

          exit 1
